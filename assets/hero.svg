<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="heroGlowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroGlowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heroText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#E9D9FF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="heroStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.015"/>
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="480" fill="#09090B"/>
  <rect width="1200" height="480" fill="url(#grid)"/>

  <circle cx="180" cy="90" r="260" fill="url(#heroGlowA)" filter="url(#softBlur)"/>
  <circle cx="1040" cy="400" r="300" fill="url(#heroGlowB)" filter="url(#softBlur)"/>

  <!-- glass panel -->
  <rect x="60" y="60" width="1080" height="360" rx="28" fill="url(#cardGrad)" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="61" y="61" width="1078" height="1" fill="#FFFFFF" opacity="0.18"/>

  <!-- eyebrow -->
  <g transform="translate(100,108)">
    <rect width="176" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.05" stroke="#8B5CF6" stroke-opacity="0.5"/>
    <circle cx="24" cy="17" r="5" fill="#C084FC"/>
    <text x="42" y="22" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="2" fill="#C084FC">SHAZBOTZ&#160;LAB</text>
  </g>

  <!-- main title -->
  <text x="98" y="228" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="-2" fill="url(#heroText)">SHAZBOTZ</text>

  <!-- subtitle -->
  <text x="100" y="278" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#FFFFFF" fill-opacity="0.72">Muhammed Shamil &#8212; Building AI, automation &amp; tools</text>

  <!-- divider line -->
  <rect x="100" y="308" width="360" height="1" fill="url(#heroStroke)"/>

  <!-- tag row -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.55">
    <g transform="translate(100,344)">
      <circle cx="4" cy="-4" r="3" fill="#8B5CF6"/>
      <text x="16" y="0">AI Systems</text>
    </g>
    <g transform="translate(232,344)">
      <circle cx="4" cy="-4" r="3" fill="#A855F7"/>
      <text x="16" y="0">Automation</text>
    </g>
    <g transform="translate(380,344)">
      <circle cx="4" cy="-4" r="3" fill="#C084FC"/>
      <text x="16" y="0">Telegram Bots</text>
    </g>
    <g transform="translate(536,344)">
      <circle cx="4" cy="-4" r="3" fill="#8B5CF6"/>
      <text x="16" y="0">Product Engineering</text>
    </g>
  </g>

  <!-- right side glass orb illustration -->
  <g transform="translate(940,180)">
    <circle cx="0" cy="0" r="120" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <circle cx="0" cy="0" r="86" fill="#FFFFFF" fill-opacity="0.03" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <circle cx="0" cy="0" r="52" fill="url(#heroGlowA)"/>
    <circle cx="-28" cy="-40" r="4" fill="#C084FC"/>
    <circle cx="46" cy="10" r="3" fill="#FFFFFF" fill-opacity="0.7"/>
    <circle cx="10" cy="60" r="2.5" fill="#A855F7"/>
    <path d="M -120 0 A 120 120 0 0 1 0 -120" stroke="#FFFFFF" stroke-opacity="0.15" fill="none"/>
  </g>

  <rect x="60" y="440" width="1080" height="1" fill="#FFFFFF" opacity="0.06"/>
</svg>
