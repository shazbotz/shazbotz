<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#0C0710"/>
    </linearGradient>
    <radialGradient id="bgGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <pattern id="bgDots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="220" fill="url(#bgFade)"/>
  <rect width="1200" height="220" fill="url(#bgDots)"/>
  <circle cx="140" cy="60" r="180" fill="url(#bgGlowL)" filter="url(#bgBlur)"/>
  <circle cx="1080" cy="160" r="220" fill="url(#bgGlowR)" filter="url(#bgBlur)"/>
  <g opacity="0.5" font-family="Helvetica, Arial, sans-serif">
    <text x="600" y="118" text-anchor="middle" font-size="30" font-weight="600" fill="#FFFFFF">Crafted with intent, shipped with care.</text>
  </g>
</svg>
